name: Sync upstream

on:
  schedule:
    - cron: '0 4 * * *'  # 4am UTC nightly
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Record existing version tags
        id: tags_before
        run: |
          git ls-remote --tags origin \
            | awk '/^[^ ]+ refs\/tags\/v/ && !/^{}$/ { sub("refs/tags/", "", $2); print $2 }' \
            | sort -V > /tmp/origin_tags_before.txt
          if [ -s /tmp/origin_tags_before.txt ]; then
            echo "latest=$(tail -1 /tmp/origin_tags_before.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "latest=" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/coredevices/PebbleOS.git
          git fetch upstream main --tags --force

      - name: Merge upstream/main
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "clean=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push main (clean merge)
        if: steps.merge.outputs.clean == 'true'
        run: git push origin main

      - name: Push new release tag
        if: steps.merge.outputs.clean == 'true'
        id: release_tag
        run: |
          mapfile -t new_tags < <(
            git tag -l 'v*' | sort -V | while read -r tag; do
              if ! grep -qxF "$tag" /tmp/origin_tags_before.txt; then
                echo "$tag"
              fi
            done
          )

          if [ "${#new_tags[@]}" -eq 0 ]; then
            echo "No new upstream version tags."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_new="${new_tags[-1]}"
          echo "latest_new=$latest_new" >> "$GITHUB_OUTPUT"
          echo "Pushing release tag $latest_new (skipping ${#new_tags[@]} new tag(s), using latest only)."
          git push origin "refs/tags/${latest_new}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Release summary
        if: steps.release_tag.outputs.pushed == 'true'
        run: |
          echo "Tagged ${{ steps.release_tag.outputs.latest_new }} — Release workflow will build firmware from the tag push."

      - name: Open conflict PR (unclean merge)
        if: steps.merge.outputs.clean == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true
          git add -A
          git diff --cached --quiet || git commit -m "sync: upstream merge $(date +%Y-%m-%d) (conflicts need resolution)"
          git push origin "$BRANCH"
          gh pr create \
            --title "sync: upstream $(date +%Y-%m-%d) -- conflicts" \
            --body "$(cat <<'EOF'
          Nightly upstream sync could not merge cleanly. Resolve the conflicts
          in this branch and merge to keep main up to date.

          Upstream: https://github.com/coredevices/PebbleOS
          EOF
          )" \
            --base main \
            --head "$BRANCH"
