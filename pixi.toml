[workspace]
name = "PebbleOS"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[activation.env]
PEBBLEOS_SDK_ROOT = "$PIXI_PROJECT_ROOT/pebbleos-sdk"
PATH = "$PIXI_PROJECT_ROOT/pebbleos-sdk/arm-none-eabi/bin:$PIXI_PROJECT_ROOT/pebbleos-sdk/qemu/bin:$PIXI_PROJECT_ROOT/pebbleos-sdk/sftool:$PATH"

#
# Tasks
#

[tasks.download-sdk]
cmd = "curl -LsSf https://github.com/coredevices/PebbleOS-SDK/releases/latest/download/pebbleos-sdk-installer.sh | sh -s -- --prefix $PIXI_PROJECT_ROOT/pebbleos-sdk --force"
description = "Download and install the PebbleOS SDK"
outputs = ["pebbleos-sdk/.sdk-info"]

[tasks.waf-configure]
args = [
    { arg = "board", default = "qemu_emery", choices = [
        "qemu_emery",   # QEMU: Pebble Time 2
        "qemu_flint",   # QEMU: Pebble 2 Duo
        "qemu_gabbro",  # QEMU: Pebble Round 2
        "asterix",      # (Core Devices) Pebble 2 Duo
        "obelix_dvt",   # (Core Devices) Pebble Time 2 DVT
        "obelix_pvt",   # (Core Devices) Pebble Time 2 PVT
        "getafix_evt",  # (Core Devices) Pebble Round 2 EVT
        "getafix_dvt",  # (Core Devices) Pebble Round 2 DVT
        "getafix_dvt2", # (Core Devices) Pebble Round 2 DVT2
    ] },
    { arg = "variant", default = "normal", choices = [
        "normal", # main firmware 
        "prf",    # recovery firmware
    ] },
    { arg = "mode", default = "debug", choices = ["debug", "release"] },
]
cmd = "./waf configure --board {{ board }} --variant {{ variant }}{% if mode == 'release' %} -DCONFIG_RELEASE=y{% endif %}"
description = "Configure the firmware build for a target board"
depends-on = ["download-sdk"]

[tasks.waf-build]
cmd = "./waf build"
description = "Build the firmware"

[tasks.waf-bundle]
cmd = "./waf bundle"
description = "Bundle firmware into a .pbz file for Bluetooth sideloading via Pebble app"

[tasks.waf-qemu]
# qemu-pebble links against homebrew paths; redirect dyld to pixi environment instead
cmd = "DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH ./waf qemu"
description = "Run the firmware in the QEMU emulator"

[tasks.emulator-pebble-2-duo]
description = "Configure, build, and run Pebble 2 Duo (qemu_flint) in QEMU"
depends-on = [
    { task = "waf-configure", args = [
        { board = "qemu_flint" },
    ] },
    "waf-build",
    "waf-qemu",
]

[tasks.emulator-pebble-time-2]
description = "Configure, build, and run Pebble Time 2 (qemu_emery) in QEMU"
depends-on = [
    { task = "waf-configure", args = [
        { board = "qemu_emery" },
    ] },
    "waf-build",
    "waf-qemu",
]

[tasks.emulator-pebble-round-2]
description = "Configure, build, and run Pebble Round 2 (qemu_gabbro) in QEMU"
depends-on = [
    { task = "waf-configure", args = [
        { board = "qemu_gabbro" },
    ] },
    "waf-build",
    "waf-qemu",
]

#
# Dependencies
#

